<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Indoor Navigation - Hospital Assistant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#62fae3",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "surface-dim": "#d8dadc",
                        "secondary-fixed-dim": "#3cddc7",
                        "inverse-surface": "#2d3133",
                        "on-secondary-fixed": "#00201c",
                        "on-surface-variant": "#414755",
                        "background": "#f7f9fb",
                        "surface-bright": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e0e3e5",
                        "on-error": "#ffffff",
                        "primary-fixed": "#d8e2ff",
                        "error-container": "#ffdad6",
                        "surface-container": "#eceef0",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#005047",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed-dim": "#ffb595",
                        "secondary": "#006b5f",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "on-secondary-container": "#007165",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "surface-container-low": "#f2f4f6",
                        "on-primary-fixed-variant": "#004493",
                        "on-secondary": "#ffffff",
                        "tertiary": "#9e3d00",
                        "on-background": "#191c1e",
                        "primary": "#0058bc",
                        "inverse-primary": "#adc6ff",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-container-high": "#e6e8ea",
                        "tertiary-container": "#c64f00",
                        "on-tertiary-fixed": "#351000",
                        "outline-variant": "#c1c6d7",
                        "surface-container-highest": "#e0e3e5",
                        "primary-container": "#0070eb",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#001a41",
                        "on-surface": "#191c1e",
                        "secondary-container": "#62fae3",
                        "surface": "#f7f9fb",
                        "tertiary-fixed": "#ffdbcc",
                        "outline": "#717786",
                        "surface-tint": "#005bc1"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "touch-target-min": "48px",
                        "container-padding": "24px",
                        "card-padding": "24px",
                        "stack-gap": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(247, 249, 251, 0.8) 0%, rgba(247, 249, 251, 0) 20%);
        }
        .nav-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Header (Manual creation based on intent + JSON logic) -->
<header class="fixed top-0 left-0 w-full z-40 flex justify-between items-center px-container-padding py-unit h-touch-target-min bg-transparent">
<button class="bg-surface-container-lowest/80 backdrop-blur-md rounded-full w-12 h-12 flex items-center justify-center shadow-sm active:scale-95 transition-transform" onclick="window.history.back()">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex-grow flex justify-center">
<span class="font-headline-sm text-on-surface bg-surface-container-lowest/80 backdrop-blur-md px-4 py-2 rounded-full shadow-sm">Navigation</span>
</div>
<div class="w-12"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow relative flex flex-col pt-0">
<!-- Top Half: Map View -->
<section class="h-1/2 w-full relative overflow-hidden bg-surface-variant">
<img alt="Indoor map" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQWkoofTxh6lihp-Ky2pMtiPQqVAFErbjhXqhHk5XRVx8PQKFA7CDJ23kTxdGhHi0cfA8AfB8ig4_pYnU6gCsaUhWmxSXsJDhQjtTs2UA-tc72YgW4bcWVFs2dw77mkbgKKc5ivr2KCHM9t8Lp76aCXG0LDxasT2kl4b9IpqIR4E3fqVt9WD8MFpTzTizgW4zIxy2O0TC0C3F7nG6aswfgJ6Z1R2BwpwKj5xpdGT9BZThO7i_jUczzugL5hu6XaOX2Dq8tlnFkWlOh" style="object-position: center;"/>
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
<!-- Target Indicator (Simulated) -->
<div class="absolute top-[40%] left-[60%] flex flex-col items-center">
<div class="w-6 h-6 bg-primary rounded-full border-4 border-white shadow-lg nav-pulse"></div>
<div class="mt-2 bg-primary-container text-on-primary-container px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-md">
                    Target: 204
                </div>
</div>
</section>
<!-- Bottom Half: Destination Details & Action -->
<section class="h-1/2 w-full bg-surface-container-lowest rounded-t-lg shadow-[0_-12px_40px_rgba(0,0,0,0.06)] relative z-10 -mt-8 px-container-padding pt-10 flex flex-col gap-8">
<!-- Handle Decorator -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-surface-variant rounded-full"></div>
<!-- Destination Info -->
<div class="flex flex-col gap-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<h1 class="font-headline-md text-on-surface">Dr. Smith's Room - 204</h1>
</div>
<p class="font-body-md text-outline">Cardiology Department • 2nd Floor</p>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-5 rounded-lg flex items-center gap-4">
<div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary">straighten</span>
</div>
<div>
<p class="font-label-sm text-outline uppercase tracking-wider">Distance</p>
<p class="font-headline-sm text-on-surface">150m</p>
</div>
</div>
<div class="bg-surface-container-low p-5 rounded-lg flex items-center gap-4">
<div class="w-12 h-12 bg-secondary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">schedule</span>
</div>
<div>
<p class="font-label-sm text-outline uppercase tracking-wider">Estimate</p>
<p class="font-headline-sm text-on-surface">2 min</p>
</div>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-headline-sm h-14 rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">navigation</span>
                Start Navigation
            </button>
<!-- Secondary Info/Helper -->
<div class="mt-auto pb-16 flex items-center justify-center gap-2 text-outline">
<span class="material-symbols-outlined text-sm">info</span>
<span class="font-label-md">Follow the teal line on the map above</span>
</div>
</section>
</main>
<!-- Bottom Navigation Bar (Constructed from Shared Components JSON) -->
<!-- active_navigation: No direct match for "Navigation", defaulting to "Home" intent as base -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-surface-container-lowest dark:bg-inverse-surface rounded-t-lg shadow-[0_-8px_24px_rgba(0,0,0,0.08)]">
<!-- Home (Inactive) -->
<a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant px-6 py-2 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<!-- Chat (Inactive) -->
<a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant px-6 py-2 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined mb-1">chat_bubble</span>
<span class="font-label-sm text-label-sm">Chat</span>
</a>
<!-- Profile (Inactive) -->
<a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant px-6 py-2 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
<!-- Micro-interaction for feedback -->
<script>
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Starting...`;
            btn.classList.add('opacity-90');
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Navigation Started`;
                btn.classList.replace('bg-primary', 'bg-secondary');
            }, 1200);
        });
    </script>
</body></html>
