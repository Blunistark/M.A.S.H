<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_11');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
varying vec2 v_texCoord;

// Simplex 2D noise
vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }

float snoise(vec2 v){
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
           -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy) );
  vec2 x0 = v -   i + dot(i, C.xx);
  vec2 i1;
  i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod(i, 289.0);
  vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
  + i.x + vec3(0.0, i1.x, 1.0 ));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
    dot(x12.zw,x12.zw)), 0.0);
  m = m*m ;
  m = m*m ;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
  vec3 g;
  g.x  = a0.x  * x0.x  + h.x  * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

void main() {
    vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.x, u_resolution.y);
    
    // Core orb shape
    float d = length(uv);
    
    // Multi-layered noise for particle/speckle effect
    float noise1 = snoise(uv * 4.0 + u_time * 0.2);
    float noise2 = snoise(uv * 10.0 - u_time * 0.5);
    float noise3 = snoise(uv * 40.0 + u_time * 1.0); // High frequency speckles
    
    // Soft orb boundary
    float orb = smoothstep(0.6, 0.0, d);
    
    // Intense core glow
    float core = 0.04 / (d + 0.01);
    
    // Sparkle layer inspired by {{DATA:IMAGE:IMAGE_2}}
    float sparkles = pow(max(0.0, noise3), 15.0) * 4.0;
    sparkles *= smoothstep(0.5, 0.45, d); // Mask to orb area
    
    // Dynamic color palette from design system (Teal/Cyan/Blue)
    vec3 colorCore = vec3(0.1, 0.9, 0.8); // Bright Teal
    vec3 colorOuter = vec3(0.0, 0.4, 0.7); // Deep Blue
    vec3 colorGold = vec3(0.9, 0.6, 0.2); // Warm orange/gold sparkles like the ref
    
    vec3 finalColor = mix(colorOuter, colorCore, core + noise1 * 0.3);
    finalColor += colorGold * sparkles;
    finalColor += core * colorCore;
    
    // Pulses
    float pulse = 0.9 + 0.1 * sin(u_time * 2.0);
    finalColor *= pulse;
    
    // Vignette
    float mask = smoothstep(1.2, 0.5, d);
    
    gl_FragColor = vec4(finalColor * mask, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        // Micro-interaction for suggestion chips
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 150);
            });
        });

        // Voice Mode Toggle Logic
        const trigger = document.getElementById('trigger-voice-mode');
        const overlay = document.getElementById('voice-mode-overlay');
        const closeBtn = document.getElementById('close-voice-mode');
        const body = document.body;

        function toggleVoiceMode(active) {
            if (active) {
                body.classList.add('voice-active');
                // Optional: set a darker status bar color via meta tag if needed for iOS
            } else {
                body.classList.remove('voice-active');
            }
        }

        trigger.addEventListener('click', () => toggleVoiceMode(true));
        closeBtn.addEventListener('click', () => toggleVoiceMode(false));

        // Close on ESC key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && body.classList.contains('voice-active')) {
                toggleVoiceMode(false);
            }
        });
    </script>
